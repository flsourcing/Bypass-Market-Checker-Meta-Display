<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="manifest" href="./public/manifest.webmanifest" />
    <meta name="theme-color" content="#050a14" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bypass Market Checker</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #050a14;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
      }

      body {
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at 50% 45%, rgba(98, 210, 255, 0.08), transparent 42%),
          rgba(5, 10, 20, 0.88);
      }

      .lookup-panel {
        position: relative;
        width: min(520px, calc(100vw - 56px));
        display: flex;
        gap: 18px;
        align-items: center;
        justify-content: center;
        padding: 22px;
        border: 1px solid rgba(255, 255, 255, 0.18);
        border-radius: 999px;
        background: rgba(5, 10, 20, 0.34);
        box-shadow:
          0 18px 70px rgba(0, 0, 0, 0.26),
          inset 0 1px 0 rgba(255, 255, 255, 0.18);
        backdrop-filter: blur(18px) saturate(1.25);
        -webkit-backdrop-filter: blur(18px) saturate(1.25);
      }

      .lookup-button {
        min-width: 190px;
        min-height: 78px;
        padding: 0 24px;
        border: 1px solid rgba(255, 255, 255, 0.16);
        border-radius: 999px;
        color: rgba(255, 255, 255, 0.94);
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.17), rgba(255, 255, 255, 0.07)),
          rgba(20, 28, 44, 0.5);
        font: inherit;
        font-size: 23px;
        font-weight: 800;
        letter-spacing: -0.3px;
      }

      .lookup-button:focus-visible,
      .lookup-button:hover {
        outline: none;
        border-color: rgba(98, 210, 255, 0.9);
        background:
          linear-gradient(180deg, rgba(98, 210, 255, 0.34), rgba(98, 210, 255, 0.13)),
          rgba(12, 28, 44, 0.72);
        box-shadow:
          0 0 0 5px rgba(98, 210, 255, 0.2),
          0 18px 42px rgba(0, 0, 0, 0.28);
        transform: scale(1.025);
      }

      .lookup-status {
        position: fixed;
        bottom: 118px;
        left: 50%;
        transform: translateX(-50%);
        padding: 8px 14px;
        border-radius: 999px;
        color: rgba(255, 255, 255, 0.72);
        background: rgba(0, 0, 0, 0.24);
        font-size: 13px;
        font-weight: 600;
      }

      @media (max-width: 480px) {
        .lookup-panel {
          width: min(420px, calc(100vw - 40px));
          gap: 12px;
          padding: 14px;
        }

        .lookup-button {
          min-width: 0;
          flex: 1;
          min-height: 68px;
          padding: 0 14px;
          font-size: 18px;
        }
      }
    </style>
  </head>
  <body>
    <main class="lookup-panel" aria-label="Bypass Market Checker">
      <button class="lookup-button" type="button" data-mode="Image lookup selected">
        Image Lookup
      </button>
      <button class="lookup-button" type="button" data-mode="Barcode lookup selected">
        Barcode Lookup
      </button>
    </main>
    <p class="lookup-status" aria-live="polite">Select a lookup mode</p>
    <script>
      const buttons = Array.from(document.querySelectorAll('.lookup-button'))
      const status = document.querySelector('.lookup-status')

      buttons[0]?.focus()

      buttons.forEach((button) => {
        button.addEventListener('click', () => {
          status.textContent = button.dataset.mode
        })
      })

      window.addEventListener('keydown', (event) => {
        const currentIndex = buttons.indexOf(document.activeElement)

        if (event.key === 'ArrowRight' || event.key === 'ArrowDown') {
          event.preventDefault()
          buttons[currentIndex <= 0 ? 1 : 0]?.focus()
        }

        if (event.key === 'ArrowLeft' || event.key === 'ArrowUp') {
          event.preventDefault()
          buttons[currentIndex <= 0 ? 1 : 0]?.focus()
        }
      })
    </script>
  </body>
</html>
